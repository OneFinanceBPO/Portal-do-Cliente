<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Finance — Gerenciamento</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .top-bar { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:32px; width:420px; }
  .modal h3 { font-size:16px; font-weight:700; margin-bottom:20px; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
  .confirm-modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:32px; width:360px; text-align:center; }
  .confirm-modal .icon { width:52px; height:52px; background:rgba(244,63,94,.12); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
  .confirm-modal .icon svg { width:24px; height:24px; color:var(--red); }
  .confirm-modal p { font-size:13px; color:var(--text2); margin:8px 0 24px; }
  .badge-status { font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; background:rgba(34,197,94,.12); color:var(--green); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand"><a href="gerenciamento.html"><img src="logo.png" alt="One Finance"></a></div>
  <nav>
    <a href="gerenciamento.html">
      <button class="nav-btn active" title="Gerenciamento">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="nav-tooltip">Clientes</span>
      </button>
    </a>
<button class="nav-btn" id="btnPerfilNav" title="Perfil" onclick="openPerfil()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span class="nav-tooltip">Perfil</span>
    </button>
    <button class="nav-btn" title="Suporte">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/>
      </svg>
      <span class="nav-tooltip">Suporte</span>
    </button>
  </nav>
  <div class="bottom-nav">
    <a href="index.html">
      <button class="nav-btn" title="Sair">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span class="nav-tooltip">Sair</span>
      </button>
    </a>
  </div>
</aside>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <span class="logo-text">One <span>Finance</span></span>
    <div class="divider-v"></div>
    <span class="page-title">Gerenciamento</span>
  </div>
  <div class="header-right">
    <div class="time-badge">
      <span class="lbl">Última atualização</span>
      <span id="clock"></span>
    </div>
    <button class="icon-btn" title="Tela cheia" onclick="toggleFull()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
      </svg>
    </button>
    <div class="avatar" title="Administrador">OF</div>
  </div>
</header>

<!-- MAIN -->
<main class="main">
  <div class="page">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div style="display:flex; gap:10px; align-items:center; margin-left:auto;">
        <span style="font-size:12px; color:var(--text2);" id="countLabel"></span>
        <button class="btn btn-primary" id="btnNovoCliente" onclick="openAddModal()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          Novo cliente
        </button>
      </div>
    </div>

    <!-- GRID DE CLIENTES -->
    <div class="clients-grid" id="clientsGrid">
      <!-- preenchido via JS -->
    </div>

  </div>
</main>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-dot"></div>
  One Finance BPO Financeiro &nbsp;·&nbsp; v1.1.4
</div>

<!-- MODAL: ADICIONAR/EDITAR CLIENTE -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3 id="modalTitle">Novo Cliente</h3>
    <div class="form-group">
      <label class="form-lbl">Nome da Empresa</label>
      <input class="form-input" type="text" id="novaEmpresa" placeholder="Ex: Empresa XYZ Ltda" style="padding:10px 14px">
    </div>
    <div class="form-group">
      <label class="form-lbl">CNPJ</label>
      <input class="form-input" type="text" id="novoCNPJ" placeholder="00.000.000/0001-00" style="padding:10px 14px">
    </div>
    <div class="form-group">
      <label class="form-lbl">Segmento</label>
      <select class="form-input filter-sel" id="novoSegmento" style="padding:10px 14px">
        <option>Comércio</option>
        <option>Serviços</option>
        <option>Indústria</option>
        <option>Tecnologia</option>
        <option>Saúde</option>
        <option>Construção Civil</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: GESTÃO DE PERFIS -->
<div class="modal-overlay" id="perfilModal">
  <div class="modal" style="width:520px;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h3 style="margin:0;">Gestão de Perfis</h3>
      <button class="btn btn-primary" style="padding:7px 14px;font-size:12px;" onclick="openNovoPerfil()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:13px;height:13px;margin-right:5px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Novo Perfil
      </button>
    </div>
    <div id="perfisList" style="display:flex;flex-direction:column;gap:10px;"></div>
    <div class="modal-actions" style="margin-top:20px;">
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
    </div>
  </div>
</div>

<!-- MODAL: CRIAR / EDITAR PERFIL -->
<div class="modal-overlay" id="perfilFormModal">
  <div class="modal" style="width:480px;max-height:90vh;overflow-y:auto;">
    <h3 id="perfilFormTitle">Novo Perfil</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label class="form-lbl">Nome</label>
        <input class="form-input" type="text" id="perfilNome" placeholder="Nome" style="padding:10px 14px">
      </div>
      <div class="form-group">
        <label class="form-lbl">Sobrenome</label>
        <input class="form-input" type="text" id="perfilSobrenome" placeholder="Sobrenome" style="padding:10px 14px">
      </div>
    </div>
    <div class="form-group">
      <label class="form-lbl">E-mail para login</label>
      <input class="form-input" type="email" id="perfilEmail" placeholder="seu@email.com.br" style="padding:10px 14px">
    </div>
    <div class="form-group">
      <label class="form-lbl">Senha</label>
      <input class="form-input" type="password" id="perfilSenha" placeholder="••••••••" style="padding:10px 14px">
    </div>
    <div class="form-group" style="margin-top:4px;">
      <label class="form-lbl">Tipo de Acesso</label>
      <select class="form-input filter-sel" id="perfilTipo" style="padding:10px 14px">
        <option value="adm">Administrador — acesso total ao sistema</option>
        <option value="limitado">Colaborador — somente visualização</option>
      </select>
    </div>
    <div style="margin-top:16px;">
      <div class="form-lbl" style="margin-bottom:10px;">Empresas com acesso</div>
      <div id="perfilEmpresas" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="backToPerfis()">Voltar</button>
      <button class="btn btn-primary" onclick="savePerfil()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: CONFIRMAR EXCLUSÃO -->
<div class="modal-overlay" id="delModal">
  <div class="confirm-modal">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </div>
    <div style="font-size:15px;font-weight:700;">Excluir cliente?</div>
    <p>Esta ação removerá o acesso de <strong id="delName"></strong> ao portal. Os dados históricos serão mantidos.</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn" style="background:rgba(244,63,94,.15);color:var(--red);border:1px solid rgba(244,63,94,.3);" onclick="confirmDelete()">Excluir</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_CLIENTS = [{ id:1, name:'Limpar', segment:'Serviços', cnpj:'—' }];

function loadClients() {
  try { return JSON.parse(localStorage.getItem('of_clients')) || DEFAULT_CLIENTS; }
  catch { return DEFAULT_CLIENTS; }
}
function saveClients() {
  localStorage.setItem('of_clients', JSON.stringify(clients));
}

let clients = loadClients();
let editId = null;
let deleteId = null;

function renderClients(list) {
  const grid = document.getElementById('clientsGrid');
  grid.innerHTML = list.map(c => `
    <div class="client-card" onclick="goClient(${c.id})">
      <div class="client-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <div class="client-info">
        <div class="client-name">${c.name}</div>
        <div class="client-meta">${c.segment} · ${c.cnpj}</div>
      </div>
      ${!isLimitedUser ? `
      <div class="client-actions" onclick="event.stopPropagation()">
        <button class="act-btn edit" title="Editar" onclick="openEdit(${c.id})">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </button>
        <button class="act-btn del" title="Excluir" onclick="openDelete(${c.id})">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>` : ''}
    </div>
  `).join('');
  document.getElementById('countLabel').textContent = `${list.length} cliente${list.length !== 1 ? 's' : ''} cadastrado${list.length !== 1 ? 's' : ''}`;
}

function getVisibleClients() {
  const loginEmail = localStorage.getItem('of_login_email') || '';
  const isRawAdmin = !loginEmail || loginEmail.includes('adm') || loginEmail.includes('onefinance');
  if (isRawAdmin) return clients;
  const perfil = perfis.find(p => p.email === loginEmail);
  if (!perfil || (perfil.tipo || 'adm') === 'adm') return clients;
  if (!perfil.acesso || perfil.acesso.length === 0) return [];
  return clients.filter(c => perfil.acesso.includes(c.id));
}

function goClient(id) {
  const c = clients.find(x => x.id === id);
  localStorage.setItem('currentClient', JSON.stringify(c));
  window.location.href = 'dashboard.html';
}

function openAddModal() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Novo Cliente';
  document.getElementById('novaEmpresa').value = '';
  document.getElementById('novoCNPJ').value = '';
  document.getElementById('novoEmail').value = '';
  document.getElementById('addModal').classList.add('open');
}

function openEdit(id) {
  editId = id;
  const c = clients.find(x => x.id === id);
  document.getElementById('modalTitle').textContent = 'Editar Cliente';
  document.getElementById('novaEmpresa').value = c.name;
  document.getElementById('novoCNPJ').value = c.cnpj;
  document.getElementById('novoEmail').value = '';
  document.getElementById('novoSegmento').value = c.segment;
  document.getElementById('addModal').classList.add('open');
}

function openDelete(id) {
  deleteId = id;
  const c = clients.find(x => x.id === id);
  document.getElementById('delName').textContent = c.name;
  document.getElementById('delModal').classList.add('open');
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
}

function saveClient() {
  const name = document.getElementById('novaEmpresa').value.trim();
  const cnpj = document.getElementById('novoCNPJ').value.trim();
  const seg  = document.getElementById('novoSegmento').value;
  if (!name) return;
  if (editId) {
    const c = clients.find(x => x.id === editId);
    c.name = name; c.cnpj = cnpj || c.cnpj; c.segment = seg;
  } else {
    clients.push({ id: Date.now(), name, segment: seg, cnpj: cnpj || '00.000.000/0001-00' });
  }
  saveClients(); closeModal(); renderClients(getVisibleClients());
}

function confirmDelete() {
  clients = clients.filter(x => x.id !== deleteId);
  saveClients(); closeModal(); renderClients(getVisibleClients());
}

// ── GESTÃO DE PERFIS ──
let perfis = JSON.parse(localStorage.getItem('of_perfis') || '[]');
let editPerfilId = null;
let isLimitedUser = false;

function savePerfisStorage() {
  localStorage.setItem('of_perfis', JSON.stringify(perfis));
}

function renderPerfis() {
  const el = document.getElementById('perfisList');
  if (perfis.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text2);font-size:12px;padding:20px 0;">Nenhum perfil cadastrado</div>';
    return;
  }
  el.innerHTML = perfis.map(p => {
    const isAdm = (p.tipo || 'adm') === 'adm';
    const badgeBg = isAdm ? 'rgba(34,197,94,.12)' : 'rgba(251,146,60,.12)';
    const badgeColor = isAdm ? 'var(--green)' : '#fb923c';
    const badgeLabel = isAdm ? 'Admin' : 'Colaborador';
    return `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;
      background:rgba(37,99,235,.06);border:1px solid var(--border);border-radius:10px;">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--accent);
        display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;">
        ${(p.nome?.[0]||'?').toUpperCase()}${(p.sobrenome?.[0]||'').toUpperCase()}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;font-weight:600;">${p.nome} ${p.sobrenome}</span>
          <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;
            background:${badgeBg};color:${badgeColor};">${badgeLabel}</span>
        </div>
        <div style="font-size:11px;color:var(--text2);">${p.email} · ${(p.acesso||[]).length} empresa(s)</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="act-btn edit" title="Editar" onclick="openEditPerfil(${p.id})">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </button>
        <button class="act-btn del" title="Excluir" onclick="deletePerfil(${p.id})">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function openPerfil() {
  renderPerfis();
  document.getElementById('perfilModal').classList.add('open');
}

function openNovoPerfil() {
  editPerfilId = null;
  document.getElementById('perfilFormTitle').textContent = 'Novo Perfil';
  document.getElementById('perfilNome').value = '';
  document.getElementById('perfilSobrenome').value = '';
  document.getElementById('perfilEmail').value = '';
  document.getElementById('perfilSenha').value = '';
  document.getElementById('perfilTipo').value = 'adm';
  renderEmpresasCheckboxes([]);
  document.getElementById('perfilModal').classList.remove('open');
  document.getElementById('perfilFormModal').classList.add('open');
}

function openEditPerfil(id) {
  const p = perfis.find(x => x.id === id);
  if (!p) return;
  editPerfilId = id;
  document.getElementById('perfilFormTitle').textContent = 'Editar Perfil';
  document.getElementById('perfilNome').value = p.nome || '';
  document.getElementById('perfilSobrenome').value = p.sobrenome || '';
  document.getElementById('perfilEmail').value = p.email || '';
  document.getElementById('perfilSenha').value = p.senha || '';
  document.getElementById('perfilTipo').value = p.tipo || 'adm';
  renderEmpresasCheckboxes(p.acesso || []);
  document.getElementById('perfilModal').classList.remove('open');
  document.getElementById('perfilFormModal').classList.add('open');
}

function renderEmpresasCheckboxes(acesso) {
  document.getElementById('perfilEmpresas').innerHTML = clients.map(c => `
    <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;
      background:rgba(37,99,235,.06);border:1px solid var(--border);border-radius:8px;cursor:pointer;">
      <input type="checkbox" value="${c.id}" ${acesso.includes(c.id) ? 'checked' : ''}
        style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer;">
      <span style="font-size:13px;font-weight:600;">${c.name}</span>
      <span style="font-size:11px;color:var(--text2);margin-left:4px;">${c.segment}</span>
    </label>
  `).join('');
}

function savePerfil() {
  const acesso = [...document.querySelectorAll('#perfilEmpresas input[type=checkbox]:checked')]
    .map(cb => Number(cb.value));
  const dados = {
    nome: document.getElementById('perfilNome').value.trim(),
    sobrenome: document.getElementById('perfilSobrenome').value.trim(),
    email: document.getElementById('perfilEmail').value.trim(),
    senha: document.getElementById('perfilSenha').value,
    tipo: document.getElementById('perfilTipo').value,
    acesso,
  };
  if (!dados.nome || !dados.email) return;
  if (editPerfilId) {
    const idx = perfis.findIndex(x => x.id === editPerfilId);
    perfis[idx] = { ...perfis[idx], ...dados };
  } else {
    perfis.push({ id: Date.now(), ...dados });
  }
  savePerfisStorage();
  backToPerfis();
}

function deletePerfil(id) {
  perfis = perfis.filter(x => x.id !== id);
  savePerfisStorage();
  renderPerfis();
}

function backToPerfis() {
  document.getElementById('perfilFormModal').classList.remove('open');
  renderPerfis();
  document.getElementById('perfilModal').classList.add('open');
}

function applyAccessRestrictions() {
  const loginEmail = localStorage.getItem('of_login_email') || '';
  const isRawAdmin = !loginEmail || loginEmail.includes('adm') || loginEmail.includes('onefinance');
  if (isRawAdmin) return;
  const perfil = perfis.find(p => p.email === loginEmail);
  if (!perfil || (perfil.tipo || 'adm') === 'adm') return;
  isLimitedUser = true;
  document.getElementById('btnNovoCliente').style.display = 'none';
  document.getElementById('btnPerfilNav').style.display = 'none';
}

// close on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(); });
});

function toggleFull() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}
updateClock(); setInterval(updateClock, 30000);

applyAccessRestrictions();
renderClients(getVisibleClients());
</script>
</body>
</html>
